<!DOCTYPE html>
<html>
<head>
  <title>Romadoro</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: #0c0c0c;
      color: white;
      text-align: center;
    }
    header {
      padding: 40px;
      font-size: 32px;
      letter-spacing: 3px;
      color: gold;
    }
    .hero {
      padding: 60px 20px;
    }
    .product {
      background: #1a1a1a;
      margin: 20px;
      padding: 20px;
      border-radius: 10px;
      display: inline-block;
      width: 250px;
    }
    .price {
      color: gold;
      font-size: 18px;
    }
    button {
      margin-top: 10px;
      padding: 10px 20px;
      background: gold;
      border: none;
      cursor: pointer;
      font-weight: bold;
    }
  </style>
</head>

<body>

<header>ROMADORO</header>

<div class="hero">
  <h1>Luxury Gold Jewelry</h1>
  <p>Timeless elegance. Crafted to shine.</p>
</div>

<div class="product">
  <h3>Gold Necklace</h3>
  <p class="price">$499</p>
  <button>Buy Now</button>
</div>

<div class="product">
  <h3>Gold Bracelet</h3>
  <p class="price">$299</p>
  <button>Buy Now</button>
</div>

<div class="product">
  <h3>Gold Earrings</h3>
  <p class="price">$199</p>
  <button>Buy Now</button>
</div>

</body>
</html>
