<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Roma d'Oro | Fine Jewelry</title>
  <meta name="description" content="Roma d'Oro is a luxury fine jewelry brand built around timeless beauty, refined design, and a premium experience. Join the waitlist for our upcoming collection." />

  <style>
    body {
      background: #0A0A0A;
      color: #F5F0E8;
      font-family: Georgia, serif;
      text-align: center;
      padding: 100px 20px;
    }

    .logo {
      font-size: 20px;
      letter-spacing: 5px;
      color: #C9A84C;
      margin-bottom: 40px;
    }

    h1 {
      font-size: 48px;
      font-weight: 300;
    }

    p {
      color: #aaa;
      margin-bottom: 30px;
    }

    .waitlist-form {
      display: flex;
      max-width: 400px;
      margin: auto;
      border: 1px solid #C9A84C;
    }

    input {
      flex: 1;
      padding: 12px;
      border: none;
      outline: none;
    }

    button {
      background: #C9A84C;
      border: none;
      padding: 12px 20px;
      cursor: pointer;
    }

    .success-msg {
      display: none;
      margin-top: 20px;
      color: #E8C96A;
    }
  </style>
</head>

<body>

  <div class="logo">ROMA D'ORO</div>

  <h1>Timeless Elegance</h1>

  <p>
    A curated collection crafted for those who appreciate beauty that endures.
  </p>

  <!-- ✅ FIXED FORM -->
  <form class="waitlist-form" id="waitlistForm" action="https://formspree.io/f/xwvwqyjn" method="POST">
    <input
      type="email"
      name="email"
      placeholder="Your email address"
      required
    />
    <button type="submit">Notify Me</button>
  </form>

  <p class="success-msg" id="successMsg">Thank you — we'll be in touch.</p>

  <script>
    const form = document.getElementById('waitlistForm');
    const successMsg = document.getElementById('successMsg');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      const data = new FormData(form);

      const res = await fetch(form.action, {
        method: 'POST',
        body: data,
        headers: { 'Accept': 'application/json' }
      });

      if (res.ok) {
        form.style.display = 'none';
        successMsg.style.display = 'block';
      }
    });
  </script>

</body>
</html>
